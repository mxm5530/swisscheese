name: Check NYRR volunteer opportunities

on:
  schedule:
    # Every 30 minutes. Cron is UTC.
    - cron: "*/30 * * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

# Needed so the workflow can commit the updated state.json back to the repo
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit updated state
        run: |
          git config user.name "nyrr-volunteer-watcher"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update state [skip ci]"
          git push
